<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Pets: Hardcore Arena V3 - TV Edition</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #022c22;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            color: #34d399;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #01140f;
        }
        canvas {
            background: #01140f;
            display: block;
            border: 2px solid #10b981;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.15);
            z-index: 1;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #34d399;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.9);
            background: rgba(2, 44, 34, 0.9);
            padding: 8px 12px;
            border: 1px solid #10b981;
            z-index: 1000;
        }
        #timeBadge {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.15);
            padding: 1px 6px;
            border: 1px dashed #f59e0b;
        }
        #charDisplay {
            background: #10b981;
            color: #022c22;
            padding: 2px 7px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="hud">
        <div>SVY: <span id="levelText">1</span>/150</div>
        <div>SÜRE: <span id="timeBadge"><span id="timerText">25</span>s</span></div>
        <div>PET: <span id="charDisplay">Moosey</span></div>
        <div>PARÇA: <span id="piecesText">0/1</span></div>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeGame() {
    const containerWidth = window.innerWidth;
    const containerHeight = window.innerHeight;
    const gameRatio = 800 / 400;
    if (containerWidth / containerHeight > gameRatio) {
        canvas.style.width = (containerHeight * gameRatio) + "px";
        canvas.style.height = containerHeight + "px";
    } else {
        canvas.style.width = containerWidth + "px";
        canvas.style.height = (containerWidth / gameRatio) + "px";
    }
}
window.addEventListener("resize", resizeGame);
resizeGame();

// 9 KARAKTER VE HARDCORE İSTATİSTİKLERİ
const characterList = [
    { name: "Moosey", color: "#10b981", letter: "M", speed: 4.4, jump: -11.2 },
    { name: "Sugar", color: "#f43f5e", letter: "Su", speed: 4.2, jump: -12.2 },
    { name: "Squeak", color: "#38bdf8", letter: "Sq", speed: 5.3, jump: -11.0 },
    { name: "Gus", color: "#eab308", letter: "G", speed: 3.9, jump: -11.4 },
    { name: "Dot", color: "#a855f7", letter: "D", speed: 4.8, jump: -10.8 },
    { name: "Flip", color: "#f97316", letter: "Fl", speed: 4.5, jump: -11.3 },
    { name: "Yeyet", color: "#ec4899", letter: "Y", speed: 4.3, jump: -11.0 },
    { name: "Blook", color: "#8b5cf6", letter: "Bl", speed: 4.6, jump: -11.1 },
    { name: "Blinky", color: "#14b8a6", letter: "B", speed: 4.2, jump: -11.5 }
];

// GÖRSEL RESİM DOSYALARININ TANIMLANMASI VE YÜKLENMESİ
const images = {};
characterList.forEach(char => {
    images[char.name] = new Image();
    images[char.name].src = `${char.name}.jpg`;
});
images.Dot = new Image();
images.Dot.src = 'Dot.jpg'; // Toplanacak parça resmi

let currentLevel = parseInt(localStorage.getItem("pets_level")) || 1;
let unlockedCharIndex = parseInt(localStorage.getItem("pets_unlocked")) || 0;
let activeCharIndex = 0;

function saveProgress() {
    localStorage.setItem("pets_level", currentLevel);
    localStorage.setItem("pets_unlocked", unlockedCharIndex);
}

let levelPieceCollected = false;
let keys = { left: false, right: false, jump: false };
let levelTimer = 25; 
let lastTimeUpdate = Date.now();
let particles = [];
let flashRedFrames = 0;
let portalPulseAngle = 0;

const player = {
    x: 60, y: 200, w: 32, h: 32,
    velX: 0, velY: 0,
    jumping: false, grounded: false,
    speed: 4.4, canDash: true, dashActive: false, dashTimer: 0
};

const gravity = 0.52;
let friction = 0.80;

function createParticles(x, y, color, count = 5) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3,
            size: Math.random() * 4 + 2, alpha: 1, color: color
        });
    }
}

// 150 LEVEL GENERATOR (Sadece platform, duvar, süre ve çikolata odaklı)
function generateLevel(lvl) {
    let difficulty = Math.min(lvl / 25, 5); 
    let seed = lvl * 1543;
    function randomSeed() {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    }

    let levelData = {
        platforms: [{ x: 0, y: 340, width: 140, height: 60, type: 'normal' }],
        dotPiece: { x: 350, y: 180, width: 24, height: 24 },
        portal: { x: 745, y: 280, width: 45, height: 60 },
        chocolates: [] 
    };

    let currentX = 160;
    let currentY = 240 + Math.floor(randomSeed() * 60);

    for (let i = 0; i < 4; i++) {
        let pWidth = Math.max(120 - (difficulty * 11) - Math.floor(randomSeed() * 20), 45);
        let stepGap = 120 + (difficulty * 9) + Math.floor(randomSeed() * 25);

        let pType = 'normal';
        let rType = randomSeed();
        
        if (lvl > 2 && rType > 0.80) pType = 'wall'; // Turuncu dikey sütun (Duvar Zıplaması için)
        else if (lvl > 4 && rType > 0.60) pType = 'crumbling'; // Kırılan platformlar
        else if (lvl > 10 && rType <= 0.35) pType = 'moving'; // Hareketli platformlar

        levelData.platforms.push({ 
            x: currentX, y: currentY, width: pType === 'wall' ? 24 : pWidth, height: pType === 'wall' ? 130 : 15, 
            type: pType, startY: currentY, startX: currentX,
            range: 35 + (difficulty * 12), speed: 0.015 + (difficulty * 0.005),
            angle: randomSeed() * Math.PI * 2, moveDir: randomSeed() > 0.5 ? 'vertical' : 'horizontal',
            stepped: false, stepTime: 0, broken: false
        });

        if (randomSeed() > 0.45) {
            levelData.chocolates.push({ x: currentX + 10, y: currentY - 25, width: 16, height: 16, collected: false });
        }

        if (i === 2) {
            levelData.dotPiece.x = currentX + 10;
            levelData.dotPiece.y = currentY - 35;
        }

        currentX += stepGap;
        currentY += Math.floor(randomSeed() * 90) - 45;
        currentY = Math.max(140, Math.min(currentY, 310));
    }

    levelData.platforms.push({ x: 730, y: 340, width: 70, height: 60, type: 'normal' });
    return levelData;
}

let activeLevel = generateLevel(currentLevel);
updateHUD();

function updateHUD() {
    document.getElementById("levelText").innerText = currentLevel;
    let curChar = characterList[activeCharIndex];
    document.getElementById("charDisplay").innerText = curChar.name;
    document.getElementById("charDisplay").style.backgroundColor = curChar.color;
}

function checkCollision(obj1, obj2) {
    return obj1.x < obj2.x + obj2.width &&
           obj1.x + obj1.w > obj2.x &&
           obj1.y < obj2.y + obj2.height &&
           obj1.y + obj1.h > obj2.y;
}

// BELİRTTİĞİN TV KUMANDA DÜZENİ (Sarı, Turuncu, Yeşil, Pembe ve Geri Tuşu)
window.addEventListener("keydown", (e) => {
    if ([37, 38, 39, 40, 8, 461].includes(e.keyCode)) e.preventDefault();

    if (e.keyCode === 37) { keys.left = true; keys.right = false; } // Sarı -> Sol
    if (e.keyCode === 39) { keys.right = true; keys.left = false; } // Turuncu -> Sağ
    if (e.keyCode === 38) { keys.jump = true; } // Yeşil -> Zıplama
    
    if (e.keyCode === 40) { // Pembe -> Dash (Aşağı Tuşu)
        if (player.canDash && !player.dashActive) {
            player.dashActive = true;
            player.dashTimer = 10; 
            player.velX = (keys.right ? 16 : (keys.left ? -16 : 16));
            player.velY = 0;
            player.canDash = false;
            createParticles(player.x, player.y, "#38bdf8", 12);
        }
    }

    if (e.keyCode === 8 || e.keyCode === 461) { // Kumanda Geri Tuşu -> Karakter Değiştirme
        activeCharIndex++;
        if (activeCharIndex > unlockedCharIndex || activeCharIndex >= characterList.length) {
            activeCharIndex = 0;
        }
        updateHUD();
    }
});

window.addEventListener("keyup", (e) => {
    if (e.keyCode === 38) keys.jump = false;
});

function update() {
    let now = Date.now();
    if (now - lastTimeUpdate >= 1000) {
        levelTimer--;
        document.getElementById("timerText").innerText = levelTimer;
        lastTimeUpdate = now;
        if (levelTimer <= 0) { resetPosition(true); return; }
    }

    let curChar = characterList[activeCharIndex];
    player.speed = curChar.speed;
    friction = (curChar.name === "Squeak") ? 0.92 : 0.80;

    if (player.dashActive) {
        player.dashTimer--;
        player.velY = 0; 
        if (player.dashTimer <= 0) player.dashActive = false;
    } else {
        if (keys.left) player.velX = -player.speed;
        if (keys.right) player.velX = player.speed;
        player.velX *= friction;
        player.velY += gravity;
    }

    player.x += player.velX;
    player.y += player.velY;

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;

    if (player.y > canvas.height) { resetPosition(true); }

    player.grounded = false;
    let isWallSliding = false;

    activeLevel.platforms.forEach(p => {
        if (p.broken) return;

        if (p.type === 'moving') {
            p.angle += p.speed;
            if (p.moveDir === 'vertical') p.y = p.startY + Math.sin(p.angle) * p.range;
            else p.x = p.startX + Math.sin(p.angle) * p.range;
        }

        if (p.type === 'crumbling' && p.stepped) {
            if (Date.now() - p.stepTime > 1000) {
                p.broken = true;
                createParticles(p.x + p.width/2, p.y + p.height/2, '#10b981', 8);
            }
        }

        if (player.x + player.w > p.x && player.x < p.x + p.width &&
            player.y + player.h > p.y && player.y < p.y + p.height) {

            if (p.type === 'wall') { // DUVAR ZIPLAMASI MANTIĞI
                if (player.velY > 0) {
                    player.velY = 1.2; 
                    isWallSliding = true;
                }
                if (keys.jump && isWallSliding) {
                    player.velY = curChar.jump * 0.95;
                    player.velX = (player.x < p.x) ? -8 : 8;
                    player.dashActive = false;
                    keys.jump = false;
                    createParticles(player.x, player.y, "#f59e0b", 5);
                }
            } else { 
                if (player.y + player.h <= p.y + 12 && player.velY >= 0) {
                    player.grounded = true;
                    player.jumping = false;
                    player.velY = 0;
                    player.y = p.y - player.h;
                    player.canDash = true; 

                    if (p.type === 'moving' && p.moveDir === 'horizontal') {
                        player.x += Math.cos(p.angle) * (p.range * p.speed); 
                    }
                    if (p.type === 'crumbling' && !p.stepped) {
                        p.stepped = true; p.stepTime = Date.now();
                    }
                }
            }
        }
    });

    if (keys.jump && player.grounded && !player.jumping) {
        player.jumping = true;
        player.grounded = false;
        player.velY = curChar.jump;
        createParticles(player.x + player.w/2, player.y + player.h, '#ffffff', 5);
    }

    activeLevel.chocolates.forEach(choc => {
        if (!choc.collected && checkCollision(player, choc)) {
            choc.collected = true;
            levelTimer += 3;
            createParticles(choc.x + 8, choc.y + 8, '#f1c40f', 8);
        }
    });

    if (!levelPieceCollected && checkCollision(player, activeLevel.dotPiece)) {
        levelPieceCollected = true;
        document.getElementById("piecesText").innerText = "1 / 1";
        createParticles(activeLevel.dotPiece.x + 12, activeLevel.dotPiece.y + 12, '#00ffff', 10);
    }

    if (levelPieceCollected && checkCollision(player, activeLevel.portal)) {
        currentLevel++;
        if (currentLevel <= 150) {
            if (currentLevel % 5 === 1 && currentLevel > 1) {
                let nextTargetIndex = Math.floor((currentLevel - 1) / 5);
                if (nextTargetIndex < characterList.length) {
                    unlockedCharIndex = nextTargetIndex;
                }
            }
            saveProgress();
            activeLevel = generateLevel(currentLevel);
            resetPosition(true);
        } else {
            alert("TEBRİKLER! TÜM HARDCORE ARENAYI BİTİRDİNİZ! 🏆");
            currentLevel = 1; unlockedCharIndex = 0; activeCharIndex = 0;
            saveProgress();
            activeLevel = generateLevel(currentLevel);
            resetPosition(true);
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.03;
        if (p.alpha <= 0) particles.splice(i, 1);
    }
    portalPulseAngle += 0.05;
}

function resetPosition(resetTime) {
    player.x = 60; player.y = 200; player.velX = 0; player.velY = 0;
    player.dashActive = false; player.canDash = true;
    levelPieceCollected = false;
    document.getElementById("piecesText").innerText = "0 / 1";
    if (resetTime) levelTimer = 25;
    updateHUD();
    activeLevel.platforms.forEach(p => { if (p.type === 'crumbling') { p.stepped = false; p.broken = false; } });
    activeLevel.chocolates.forEach(choc => choc.collected = false);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Platform Çizimleri
    activeLevel.platforms.forEach(p => {
        if (p.broken) return;
        if (p.type === 'normal') ctx.fillStyle = "#047857"; 
        else if (p.type === 'moving') ctx.fillStyle = "#1d4ed8"; 
        else if (p.type === 'wall') ctx.fillStyle = "#b45309"; // Duvar rengi (Turuncu sütunlar)
        else if (p.type === 'crumbling') ctx.fillStyle = p.stepped ? "#b91c1c" : "#78350f";
        
        ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.fillStyle = "#10b981";
        ctx.fillRect(p.x, p.y, p.width, 3); 
    });

    // Çikolatalar
    activeLevel.chocolates.forEach(choc => {
        if (choc.collected) return;
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(choc.x, choc.y, choc.width, choc.height);
    });

    // Parça Görseli Çizimi (Dot.jpg varsa yüklenir, yoksa mavi yuvarlak çizilir)
    if (!levelPieceCollected) {
        if (images.Dot && images.Dot.complete && images.Dot.naturalWidth !== 0) {
            ctx.drawImage(images.Dot, activeLevel.dotPiece.x, activeLevel.dotPiece.y, activeLevel.dotPiece.width, activeLevel.dotPiece.height);
        } else {
            ctx.fillStyle = "#00ffff"; ctx.beginPath();
            ctx.arc(activeLevel.dotPiece.x + 12, activeLevel.dotPiece.y + 12, 9, 0, Math.PI * 2); ctx.fill();
        }
    }

    // Portal
    ctx.fillStyle = levelPieceCollected ? "#8b5cf6" : "#4b5563";
    ctx.fillRect(activeLevel.portal.x, activeLevel.portal.y, activeLevel.portal.width, activeLevel.portal.height);

    // KARAKTER GÖRSELİ ÇİZİMİ (Örn: Moosey.jpg vb. varsa yüklenir, yoksa düz renk çizilir)
    let curChar = characterList[activeCharIndex];
    if (images[curChar.name] && images[curChar.name].complete && images[curChar.name].naturalWidth !== 0) {
        ctx.drawImage(images[curChar.name], player.x, player.y, player.w, player.h);
    } else {
        ctx.fillStyle = curChar.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = "#000"; ctx.font = "bold 11px Arial";
        ctx.fillText(curChar.letter, player.x + 8, player.y + 20);
    }

    // Partiküller
    particles.forEach(p => {
        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size); ctx.restore();
    });

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
